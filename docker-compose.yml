version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: proofvault-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: proofvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proofvault-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/proofvault?schema=public
      - NEXT_PUBLIC_RPC_URL=https://soroban-testnet.stellar.org
      - NEXT_PUBLIC_NETWORK=testnet
      - NEXT_PUBLIC_CONTRACT_ID=CDO3CIE5WPR3CJJJMXF3PZGLH2LWYH3LJZL2L3ZJZL2L3ZJZL2L3ZJZL
    depends_on:
      - db

volumes:
  pgdata:
